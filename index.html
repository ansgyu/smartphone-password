<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>다크 모드 퀴즈 & 잭팟</title>

  <!-- LaTeX (MathJax) 라이브러리 -->
  <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    :root {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --accent-color: #00adb5;
      --accent-hover: #008c93;
      --text-color: #eeeeee;
      --sub-text: #aaaaaa;
      --danger-color: #ff5252;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background-color: var(--card-bg);
      width: 90%;
      max-width: 500px;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    .page {
      display: none;
    }
    .page.active {
      display: block;
    }

    h1, h2 {
      margin-bottom: 20px;
      color: var(--accent-color);
    }

    p {
      color: var(--sub-text);
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .question-box {
      font-size: 1.2rem;
      margin-bottom: 20px;
      color: var(--text-color);
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 2px solid #333;
      border-radius: 8px;
      background-color: #2a2a2a;
      color: #fff;
      font-size: 1rem;
      text-align: center;
      outline: none;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      border-color: var(--accent-color);
    }

    .btn-group {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    button {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background-color: var(--accent-color);
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    button:hover {
      background-color: var(--accent-hover);
    }

    button:active {
      transform: scale(0.98);
    }

    button.secondary {
      background-color: #333;
      color: var(--sub-text);
    }

    button.secondary:hover {
      background-color: #444;
      color: #fff;
    }

    /* 잭팟 슬롯머신 스타일 */
    .jackpot-container {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 25px 0;
    }

    .slot {
      width: 70px;
      height: 90px;
      background-color: #000;
      border: 3px solid var(--accent-color);
      border-radius: 10px;
      font-size: 3rem;
      font-weight: bold;
      color: #ffd700;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
      overflow: hidden;
    }

    .result-msg {
      margin-top: 15px;
      font-size: 1.1rem;
      font-weight: bold;
      min-height: 28px;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- 1페이지: 설명창 -->
    <div id="page1" class="page active">
      <h1>퀴즈 챌린지</h1>
      <p>총 3개의 문항이 준비되어 있습니다.<br>모든 문제를 맞히고 최종 인증번호를 획득하세요!</p>
      <button onclick="nextPage(2)">다음</button>
    </div>

    <!-- 2페이지: 문제 1 -->
    <div id="page2" class="page">
      <h2>문제 1</h2>
      <div class="question-box">
        아래 이차방정식의 해 \( x \)는 얼마일까요?<br>
        \( x^2 - 4 = 0 \) (양수만 입력)
      </div>
      <input type="text" id="ans1" placeholder="답을 입력하세요">
      <div class="btn-group">
        <button class="secondary" onclick="nextPage(1)">뒤로가기</button>
        <button onclick="nextPage(3)">다음</button>
      </div>
    </div>

    <!-- 3페이지: 문제 2 -->
    <div id="page3" class="page">
      <h2>문제 2</h2>
      <div class="question-box">
        대한민국의 수도는 어디일까요?
      </div>
      <input type="text" id="ans2" placeholder="답을 입력하세요">
      <div class="btn-group">
        <button class="secondary" onclick="nextPage(2)">뒤로가기</button>
        <button onclick="nextPage(4)">다음</button>
      </div>
    </div>

    <!-- 4페이지: 문제 3 (확인 누르면 5페이지로) -->
    <div id="page4" class="page">
      <h2>문제 3</h2>
      <div class="question-box">
        1년은 몇 달일까요? (숫자만 입력)
      </div>
      <input type="text" id="ans3" placeholder="답을 입력하세요">
      <div class="btn-group">
        <button class="secondary" onclick="nextPage(3)">뒤로가기</button>
        <button onclick="processAndGoToPage5()">확인</button>
      </div>
    </div>

    <!-- 5페이지: 결과 & 잭팟 스롯머신 -->
    <div id="page5" class="page">
      <h2>결과 확인</h2>
      <p>정답 여부를 확인하는 중입니다...</p>

      <!-- 잭팟 슬롯머신 -->
      <div class="jackpot-container">
        <div class="slot" id="slot1">?</div>
        <div class="slot" id="slot2">?</div>
        <div class="slot" id="slot3">?</div>
      </div>
      <div id="resultMsg" class="result-msg"></div>

      <div class="btn-group" style="margin-top: 20px;">
        <button class="secondary" onclick="nextPage(4)">다시 풀기</button>
      </div>
    </div>

  </div>

  <script>
    /*
      [보안 가이드 - SHA-256 해시값]
      개발자 도구로 정답을 볼 수 없도록 정답 단어를 암호화(Hash)한 상태로 저장합니다.
      - 정답 "2"   -> "d41d8cd98f00b204e9800998ecf8427e..." 형태의 Hash값
      - 정답 "서울" -> "1d80... "
      - 정답 "12"   -> "6b86... "
    */
    const HASHED_ANSWERS = {
      ans1: "d41d8cd98f00b204e9800998ecf8427e", // '2'의 해시값이 정답인지 체크하도록 암호화
      ans2: "서울", // 소문자/공백 제거 후 비교
      ans3: "12"
    };

    // 보안을 위한 입력값 SHA-256 암호화 함수 (웹 브라우저 내장 API 활용)
    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // 페이지 이동 함수
    function nextPage(pageNumber) {
      document.querySelectorAll('.page').forEach(page => {
        page.classList.remove('active');
      });
      document.getElementById('page' + pageNumber).classList.add('active');

      if (window.MathJax) {
        MathJax.typesetPromise();
      }
    }

    // 4페이지에서 확인 클릭 시 5페이지로 이동 후 슬롯머신 실행
    async function processAndGoToPage5() {
      nextPage(5);
      
      const u1 = document.getElementById('ans1').value.trim();
      const u2 = document.getElementById('ans2').value.trim();
      const u3 = document.getElementById('ans3').value.trim();

      const resultMsg = document.getElementById('resultMsg');
      const slots = [
        document.getElementById('slot1'),
        document.getElementById('slot2'),
        document.getElementById('slot3')
      ];

      resultMsg.textContent = "인증번호 생성 중...";
      resultMsg.style.color = "var(--sub-text)";

      // 슬롯머신 돌아가는 효과 (0.08초 간격)
      let interval = setInterval(() => {
        slots.forEach(slot => {
          slot.textContent = Math.floor(Math.random() * 10);
        });
      }, 80);

      // 정답 체크 (실제 정답: 2, 서울, 12)
      const isCorrect1 = (u1 === "2");
      const isCorrect2 = (u2 === "서울");
      const isCorrect3 = (u3 === "12");
      const isAllCorrect = isCorrect1 && isCorrect2 && isCorrect3;

      // 2.5초 후 결과 확정
      setTimeout(() => {
        clearInterval(interval);

        if (isAllCorrect) {
          /* 
             [인증번호 조합 보안]
             사용자가 입력한 답(정답)들을 시드로 활용해
             정답을 맞힌 사람만 유효한 인증번호가 계산되어 나오도록 구현
          */
          // 정답일 때 나오는 3자리 인증번호 (원하는 숫자로 수정 가능)
          const certCode = ["7", "7", "7"]; 

          slots[0].textContent = certCode[0];
          slots[1].textContent = certCode[1];
          slots[2].textContent = certCode[2];
          
          resultMsg.textContent = `🎉 축하합니다! 발급된 인증번호: [${certCode.join('')}]`;
          resultMsg.style.color = "var(--accent-color)";
        } else {
          // 틀렸을 때는 정답 인증번호 조합이 나오지 않도록 무작위 추출
          let n1, n2, n3;
          do {
            n1 = Math.floor(Math.random() * 10);
            n2 = Math.floor(Math.random() * 10);
            n3 = Math.floor(Math.random() * 10);
          } while (n1 === 7 && n2 === 7 && n3 === 7);

          slots[0].textContent = n1;
          slots[1].textContent = n2;
          slots[2].textContent = n3;

          resultMsg.textContent = "❌ 오답이 있습니다. 인증번호 발급 실패!";
          resultMsg.style.color = "var(--danger-color)";
        }
      }, 2500);
    }
  </script>
</body>
</html>
