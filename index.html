<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PASSWORD</title>

  <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --accent-color: #00adb5;
      --accent-hover: #008c93;
      --text-color: #eeeeee;
      --sub-text: #aaaaaa;
      --danger-color: #ff5252;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background-color: var(--card-bg);
      width: 90%;
      max-width: 500px;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    .page {
      display: none;
    }
    .page.active {
      display: block;
    }

    h1, h2 {
      margin-bottom: 20px;
      color: var(--accent-color);
    }

    p {
      color: var(--sub-text);
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .question-box {
      font-size: 1.2rem;
      margin-bottom: 20px;
      color: var(--text-color);
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 2px solid #333;
      border-radius: 8px;
      background-color: #2a2a2a;
      color: #fff;
      font-size: 1rem;
      text-align: center;
      outline: none;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      border-color: var(--accent-color);
    }

    .btn-group {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    button {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background-color: var(--accent-color);
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    button:hover {
      background-color: var(--accent-hover);
    }

    button:active {
      transform: scale(0.98);
    }

    button.secondary {
      background-color: #333;
      color: var(--sub-text);
    }

    button.secondary:hover {
      background-color: #444;
      color: #fff;
    }
    
    .jackpot-container {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 25px 0;
    }

    .slot {
      width: 60px;
      height: 80px;
      background-color: #000;
      border: 3px solid var(--accent-color);
      border-radius: 10px;
      font-size: 2.2rem;
      font-weight: bold;
      color: #ffd700;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
      overflow: hidden;
    }

    .code-box {
      display: none;
      background-color: #000;
      border: 2px dashed var(--accent-color);
      padding: 15px;
      border-radius: 10px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.2rem;
      font-weight: bold;
      color: #00ffcc;
      margin: 20px 0;
      word-break: break-all;
      user-select: all;
    }

    .result-msg {
      margin-top: 15px;
      font-size: 1.1rem;
      font-weight: bold;
      min-height: 28px;
    }
  </style>
</head>
<body>

  <div class="container">

    <div id="page1" class="page active">
      <h1>SMARTPHONE PASSWORD</h1>
      <p>3문항을 모두 맞혀야 암호를 획득할 수 있습니다!<br>문항별 정오는 모든 문항을 푼 후, 확인할 수 있습니다.</p>
      <button onclick="nextPage(2)">다음</button>
    </div>

    <div id="page2" class="page">
      <h2>1번.</h2>
      <div class="question-box">
        아래 이차방정식의 해 \( x \)는 얼마일까요?<br>
        \( x^2 - 4 = 0 \) (양수만 입력)
      </div>
      <input type="text" id="ans1" placeholder="답안 입력">
      <div class="btn-group">
        <button class="secondary" onclick="nextPage(1)">뒤로가기</button>
        <button onclick="nextPage(3)">다음</button>
      </div>
    </div>

    <div id="page3" class="page">
      <h2>2번.</h2>
      <div class="question-box">
        대한민국의 수도는 어디일까요?
      </div>
      <input type="text" id="ans2" placeholder="답안 입력">
      <div class="btn-group">
        <button class="secondary" onclick="nextPage(2)">뒤로가기</button>
        <button onclick="nextPage(4)">다음</button>
      </div>
    </div>

    <div id="page4" class="page">
      <h2>3번.</h2>
      <div class="question-box">
        1년은 몇 달일까요? (숫자만 입력)
      </div>
      <input type="text" id="ans3" placeholder="답안 입력">
      <div class="btn-group">
        <button class="secondary" onclick="nextPage(3)">뒤로가기</button>
        <button onclick="processAndGoToPage5()">확인</button>
      </div>
    </div>

    <div id="page5" class="page">
      <h2>결과 확인</h2>

      <div class="jackpot-container">
        <div class="slot" id="slot1">?</div>
        <div class="slot" id="slot2">?</div>
        <div class="slot" id="slot3">?</div>
      </div>

      <div id="resultMsg" class="result-msg"></div>

      <div id="codeBox" class="code-box"></div>
    </div>

  </div>

  <script>
    const SUPABASE_URL = "https://inhtzkcqsicedeavrqqu.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImluaHR6a2Nxc2ljZWRlYXZycXF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1NDI2MDEsImV4cCI6MjEwMDExODYwMX0.d-n0nNY_MB8_2Lb2QnFnhbWKVqjIRWfkZebrZ9pWylU";
    
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function nextPage(pageNumber) {
      document.querySelectorAll('.page').forEach(page => {
        page.classList.remove('active');
      });
      document.getElementById('page' + pageNumber).classList.add('active');

      if (window.MathJax) {
        MathJax.typesetPromise();
      }
    }

    async function processAndGoToPage5() {
      nextPage(5);

      const u1 = document.getElementById('ans1').value.trim();
      const u2 = document.getElementById('ans2').value.trim();
      const u3 = document.getElementById('ans3').value.trim();

      const resultMsg = document.getElementById('resultMsg');
      const codeBox = document.getElementById('codeBox');
      const slots = [
        document.getElementById('slot1'),
        document.getElementById('slot2'),
        document.getElementById('slot3')
      ];

      codeBox.style.display = "none";
      codeBox.textContent = "";
      resultMsg.textContent = "보안 서버에서 정답을 검증하는 중...";
      resultMsg.style.color = "var(--sub-text)";

      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
      let interval = setInterval(() => {
        slots.forEach(slot => {
          slot.textContent = chars.charAt(Math.floor(Math.random() * chars.length));
        });
      }, 80);

      try {
        const { data, error } = await _supabase.rpc('verify_quiz', {
          input_a1: u1,
          input_a2: u2,
          input_a3: u3
        });

        setTimeout(() => {
          clearInterval(interval);

          if (error || !data || !data.success) {
            slots[0].textContent = 'X';
            slots[1].textContent = 'O';
            slots[2].textContent = 'X';

            resultMsg.textContent = "답안 중 오답이 있습니다. 암호가 주어지지 않습니다.";
            resultMsg.style.color = "var(--danger-color)";
          } else {
            slots[0].textContent = '7';
            slots[1].textContent = '7';
            slots[2].textContent = '7';

            resultMsg.textContent = "답안이 모두 정답입니다. 다음 링크를 통해 이동하십시오.";
            resultMsg.style.color = "var(--accent-color)";

            codeBox.textContent = data.code;
            codeBox.style.display = "block";
          }
        }, 2000);

      } catch (err) {
        clearInterval(interval);
        resultMsg.textContent = "서버 통신 중 오류가 발생했습니다.";
        resultMsg.style.color = "var(--danger-color)";
      }
    }
  </script>
</body>
</html>
